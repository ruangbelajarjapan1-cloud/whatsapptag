<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIP Converter Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #075e54; --secondary: #128c7e; --accent: #25D366; --bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; color: var(--primary); margin: 0 0 5px 0; }
        .author { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; font-style: italic; }
        .box { background: #e8f5e9; padding: 15px; border-radius: 10px; border: 1px solid #c8e6c9; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; resize: vertical; min-height: 120px; }
        textarea:focus { outline: none; border-color: var(--secondary); }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-action:hover { background: var(--secondary); }
        .btn-wa { background-color: var(--accent); }
        .btn-wa:hover { background-color: #128C7E; }
        .btn-copy { background-color: #3498db; }
        .btn-copy:hover { background-color: #2980b9; }
        .btn-clear { background-color: #e74c3c; margin-top: 10px; }
        .btn-clear:hover { background-color: #c0392b; }
        .result-info { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; min-height: 15px; }
        .flex-group { display: flex; gap: 10px; margin-top: 10px; }
        .flex-group button { margin-top: 0; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIP Converter Pro</h2>
    <div class="author">Design by Wahyu</div>

    <div class="box">
        <label>1. Paste Data (Nama dan NIP):</label>
        <textarea id="inputArea" placeholder="Contoh:&#10;1. NAMA ARN251-29xxx&#10;2. NAMA ARN251-30xxx"></textarea>
        <button class="btn-action" onclick="convertNIP()">🔄 KONVERSI SEKARANG</button>
    </div>

    <label>2. Hasil Konversi (Siap Tag):</label>
    <div class="result-info" id="resultInfo"></div>
    <textarea id="outputArea" readonly placeholder="Hasil tanpa tanda # akan muncul di sini..."></textarea>

    <div class="flex-group">
        <button class="btn-action btn-copy" onclick="copyResult()">📋 SALIN HASIL</button>
        <button class="btn-action btn-wa" onclick="shareToWA()">🚀 KIRIM KE WA</button>
    </div>
    <button class="btn-action btn-clear" onclick="clearAll()">🗑️ BERSIHKAN DATA</button>
</div>

<script>
    function convertNIP() {
        const input = document.getElementById('inputArea').value.trim();
        const outputArea = document.getElementById('outputArea');
        const resultInfo = document.getElementById('resultInfo');
        
        if (!input) {
            alert('⚠️ Silakan masukkan data terlebih dahulu!');
            return;
        }

        const lines = input.split('\n');
        const results = [];
        let count = 0;

        lines.forEach(line => {
            if (!line.trim()) return;
            
            // Regex mencari pola NIP seperti ARN251-29xxx
            const nipMatch = line.match(/[A-Z]+\d+[\-]?\d+/);
            
            if (nipMatch) {
                const nip = nipMatch[0];
                // TANDA '#' DIHAPUS DI SINI AGAR LANGSUNG BIRU DI WA
                const formattedNIP = `@${nip}`; 
                results.push(formattedNIP);
                count++;
            }
        });

        if (results.length === 0) {
            outputArea.value = '';
            resultInfo.textContent = '❌ Tidak ada NIP yang ditemukan!';
            resultInfo.style.color = '#e74c3c';
        } else {
            outputArea.value = results.join('\n');
            resultInfo.textContent = `✅ Berhasil mengkonversi ${count} NIP`;
            resultInfo.style.color = 'var(--primary)';
        }
    }

    function copyResult() {
        const text = document.getElementById('outputArea').value;
        if (!text) {
            alert('⚠️ Tidak ada hasil untuk disalin!');
            return;
        }

        navigator.clipboard.writeText(text).then(() => {
            alert('📋 Hasil berhasil disalin!\n\n💡 Tips: Paste di grup WA, lalu tekan SPASI di akhir teks agar tag berubah menjadi biru.');
        }).catch(err => {
            document.getElementById('outputArea').select();
            document.execCommand('copy');
            alert('📋 Hasil berhasil disalin!');
        });
    }

    function shareToWA() {
        const text = document.getElementById('outputArea').value;
        if (!text) {
            alert('⚠️ Tidak ada hasil untuk dibagikan!');
            return;
        }
        window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
    }

    function clearAll() {
        if(confirm('Apakah Anda yakin ingin menghapus semua data?')) {
            document.getElementById('inputArea').value = '';
            document.getElementById('outputArea').value = '';
            document.getElementById('resultInfo').textContent = '';
        }
    }

    // Auto-load contoh untuk mempermudah tes
    window.addEventListener('load', function() {
        const exampleData = `1. NAMA ARN251-29xxx\n2. NAMA ARN251-30xxx`;
        document.getElementById('inputArea').value = exampleData;
    });
</script>

</body>
</html>
