<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Tagger - Design by Wahyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #075e54; --secondary: #128c7e; --accent: #25D366; --bg: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        .btn-help { position: absolute; top: 20px; right: 20px; background: #ddd; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; color: #555; }
        h2 { text-align: center; color: var(--primary); margin: 0 0 5px 0; }
        .author { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; font-style: italic; }
        
        /* Modal Help */
        #helpModal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; }
        .btn-close { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        .box { background: #e8f5e9; padding: 15px; border-radius: 10px; border: 1px solid #c8e6c9; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; resize: none; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .settings { display: flex; gap: 15px; margin-bottom: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; font-size: 13px; }
        .toggle { display: flex; align-items: center; cursor: pointer; }
        
        .list-container { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; background: #fafafa; margin-bottom: 20px; }
        .list-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item input { margin-right: 15px; transform: scale(1.3); }

        /* Area Tombol Batch */
        .batch-area { margin-top: 10px; border-top: 2px dashed #ddd; padding-top: 15px; }
        .batch-label { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; display: block; text-align: center;}
        .batch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .main-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-wa { background-color: var(--accent); }
        .btn-copy { background-color: #3498db; }
        .btn-batch { background-color: #f39c12; font-size: 12px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-help" onclick="toggleHelp(true)">?</button>
    <h2>WA Tagger Pro ✅</h2>
    <div class="author">Design by Wahyu</div>

    <div id="helpModal">
        <div class="modal-content">
            <h3>Panduan Pak Wahyu:</h3>
            <ol>
                <li>Paste daftar Nama & Nomor, lalu klik <b>Simpan</b>.</li>
                <li>Pilih nama yang ingin di-tag.</li>
                <li>Jika nama <b>lebih dari 20</b>, gunakan tombol(Kirim per 20) di WhatsApp antum.</li>
            </ol>
            <button class="btn-close" onclick="toggleHelp(false)">Tutup</button>
        </div>
    </div>

    <div class="box">
        <label>1. Input Data:</label>
        <textarea id="rawInput" rows="3" placeholder="Paste Nama & Nomor..."></textarea>
        <button class="btn-save" onclick="saveData()">💾 SIMPAN & BERSIHKAN</button>
    </div>

    <label>2. Pesan Pengantar:</label>
    <textarea id="msgInput" rows="2" placeholder="Tulis pesan..."></textarea>

    <div class="settings">
        <label class="toggle"><input type="checkbox" id="atTag" checked> Pakai '@'</label>
        <label class="toggle"><input type="checkbox" id="numTag"> No. Urut</label>
    </div>

    <label>3. Pilih Target:</label>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <input type="text" id="search" placeholder="Cari..." onkeyup="filter()" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="toggleAll()" style="padding:8px; border-radius:8px; border:none; cursor:pointer;">Pilih Semua</button>
    </div>
    
    <div class="list-container" id="nameList"></div>

    <button class="main-btn btn-wa" onclick="sendWA()">🚀 KIRIM SEMUA SEKALIGUS</button>

    <div class="batch-area" id="batchSection" style="display:none;">
        <span class="batch-label">💡 Kirim Bertahap (Agar Tag Otomatis Biru):</span>
        <div class="batch-grid" id="batchButtons"></div>
    </div>
</div>

<script>
    function toggleHelp(show) { document.getElementById('helpModal').style.display = show ? 'block' : 'none'; }
    function cleanName(txt) { return txt.replace(/[0-9\+\-\(\)]/g, '').trim(); }
    
    function saveData() {
        const raw = document.getElementById('rawInput').value;
        const names = raw.split('\n').map(cleanName).filter(n => n !== "");
        localStorage.setItem('wa_db_wahyu', JSON.stringify(names));
        render(names);
        alert("✅ Data tersimpan!");
    }

    function render(data) {
        const container = document.getElementById('nameList');
        container.innerHTML = data.map(n => `<div class="list-item" onclick="toggleItem(this)"><input type="checkbox" class="chk" value="${n}"><span>${n}</span></div>`).join('');
        updateCount();
    }

    function toggleItem(div) {
        const cb = div.querySelector('input');
        if(event.target.type !== 'checkbox') cb.checked = !cb.checked;
        updateCount();
    }

    function updateCount() {
        const selected = Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value);
        const batchSection = document.getElementById('batchSection');
        const batchGrid = document.getElementById('batchButtons');
        
        if(selected.length > 20) {
            batchSection.style.display = 'block';
            generateBatchButtons(selected);
        } else {
            batchSection.style.display = 'none';
        }
    }

    function generateBatchButtons(selected) {
        const grid = document.getElementById('batchButtons');
        grid.innerHTML = '';
        const batchSize = 20; // Ukuran per batch (bisa ganti ke 30)
        
        for (let i = 0; i < selected.length; i += batchSize) {
            const batch = selected.slice(i, i + batchSize);
            const btn = document.createElement('button');
            btn.className = 'main-btn btn-batch';
            btn.innerText = `Kirim Orang ke ${i+1}-${Math.min(i + batchSize, selected.length)}`;
            btn.onclick = () => sendBatch(batch);
            grid.appendChild(btn);
        }
    }

    function formatText(names) {
        const useAt = document.getElementById('atTag').checked;
        const useNum = document.getElementById('numTag').checked;
        const pesan = document.getElementById('msgInput').value;
        
        const formatted = names.map((n, i) => {
            let res = useAt ? "@" + n : n;
            return useNum ? (i+1) + ". " + res : res;
        });

        const namePart = useNum ? formatted.join('\n') : formatted.join(' ');
        return pesan ? pesan + "\n\n" + namePart : namePart;
    }

    function sendWA() {
        const selected = Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value);
        if(selected.length === 0) return alert("Pilih nama!");
        const txt = formatText(selected);
        window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
    }

    function sendBatch(names) {
        const txt = formatText(names);
        window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.list-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function toggleAll() {
        const cbs = document.querySelectorAll('.chk');
        let anyUnchecked = Array.from(cbs).some(c => !c.checked && c.parentElement.style.display !== 'none');
        cbs.forEach(c => { if(c.parentElement.style.display !== 'none') c.checked = anyUnchecked; });
        updateCount();
    }

    window.onload = () => {
        const saved = localStorage.getItem('wa_db_wahyu');
        if(saved) { render(JSON.parse(saved)); document.getElementById('rawInput').value = JSON.parse(saved).join('\n'); }
    };
</script>
</body>
</html>
